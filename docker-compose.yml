services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ml_hand_gesture_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - venv/
        - action: rebuild
          path: ./backend/requirements.txt

volumes:
  postgres_data:
